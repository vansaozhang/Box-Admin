name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: box-admin
  REPO: box-admin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve runtime service account
        id: runtime_sa
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          credentials = json.loads(os.environ["GCP_SA_KEY"])
          print(f"email={credentials['client_email']}")
          PY

      - name: Validate runtime service account
        shell: bash
        run: |
          test -n "${{ steps.runtime_sa.outputs.email }}"
          test -n "${{ secrets.GCP_PROJECT_ID }}"
          test -n "${{ secrets.NUXT_PUBLIC_API_BASE }}"
          echo "Using runtime service account: ${{ steps.runtime_sa.outputs.email }}"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/app
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE --all-tags

      - uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ steps.runtime_sa.outputs.email }}
            --max-instances=5
            --min-instances=0
            --memory=1Gi
            --cpu=1
            --port=8080
          env_vars: |
            NODE_ENV=production
            NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}

      - name: Show deployment info
        run: |
          echo "=========================================="
          echo "Deployment Successful!"
          echo "=========================================="
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
          echo "Service: box-admin"
          echo "Region: us-central1"
          echo "=========================================="
